name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python (LedgerText + notebooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[notebooks,test]"
      - name: Set artifact directory
        id: artifacts
        run: |
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          dir=".artifacts/${ts}-${{ github.run_id }}-py"
          mkdir -p "$dir"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
      - name: Pytest (LedgerText)
        run: |
          set -o pipefail
          pytest \
            --junitxml="${{ steps.artifacts.outputs.dir }}/junit.xml" \
            --cov=tutorfin.ledgertext \
            --cov-report="xml:${{ steps.artifacts.outputs.dir }}/coverage.xml" \
            --cov-report="term" \
            packages/ledgertext-py/tests \
            2>&1 | tee "${{ steps.artifacts.outputs.dir }}/pytest.log"
      - name: Execute lesson notebooks
        run: |
          set -o pipefail
          jupytext --execute curriculum/courses/*/modules/*.md \
            2>&1 | tee "${{ steps.artifacts.outputs.dir }}/notebooks.log"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ github.run_id }}
          path: .artifacts/

  typescript:
    name: TypeScript (LedgerText + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Set artifact directory
        id: artifacts
        run: |
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          dir=".artifacts/${ts}-${{ github.run_id }}-ts"
          mkdir -p "$dir"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
      - name: Build LedgerText
        run: |
          set -o pipefail
          pnpm --filter @tutorfin/ledgertext build \
            2>&1 | tee "${{ steps.artifacts.outputs.dir }}/ts-build.log"
      - name: Vitest
        run: |
          set -o pipefail
          pnpm --filter @tutorfin/ledgertext test \
            2>&1 | tee "${{ steps.artifacts.outputs.dir }}/vitest.log"
      - name: Build web (Next.js)
        run: |
          set -o pipefail
          pnpm --filter @tutorfin/web build \
            2>&1 | tee "${{ steps.artifacts.outputs.dir }}/next-build.log"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-${{ github.run_id }}
          path: .artifacts/

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: Install
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter @tutorfin/web exec playwright install --with-deps chromium
      - name: Set artifact directory
        id: artifacts
        run: |
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          dir=".artifacts/${ts}-${{ github.run_id }}-e2e"
          mkdir -p "$dir"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
      - name: Run E2E (placeholder — add tests under web/e2e)
        run: |
          set -o pipefail
          if [ -d web/e2e ]; then
            pnpm --filter @tutorfin/web exec playwright test \
              --reporter="junit,line" \
              --output="${{ steps.artifacts.outputs.dir }}/playwright" \
              2>&1 | tee "${{ steps.artifacts.outputs.dir }}/playwright.log"
          else
            echo "No web/e2e directory yet; skipping." \
              | tee "${{ steps.artifacts.outputs.dir }}/playwright.log"
          fi
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ github.run_id }}
          path: .artifacts/
